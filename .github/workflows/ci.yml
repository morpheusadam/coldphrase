name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No dependencies to install — build and tests use Node's stdlib + vendored assets.
      - name: Crypto unit tests
        run: node tests/crypto.test.mjs
      - name: Build single-file app
        run: node build/build.mjs
      - name: Build multi-file app
        run: node build/build-web.mjs
      - name: Build integrity + feature checks
        run: node tests/build-verify.mjs
      - name: End-to-end (encrypt → viewer decrypt)
        run: node tests/e2e.test.mjs
      - name: Confirm dist/ and web/ are in sync with source
        run: git diff --exit-code dist/ web/ || (echo "built output is stale — run 'npm run build' and commit" && exit 1)
