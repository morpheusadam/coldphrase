<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="880" height="260" role="img" aria-label="ColdPhrase — offline single-file seed-phrase vault">
  <defs>
    <style>
      .mono { font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect width="880" height="260" rx="12" fill="#000000"/>
  <rect x="0.5" y="0.5" width="879" height="259" rx="12" fill="none" stroke="#262626"/>

  <!-- rising stars -->
  <g>
    <circle cx="70"  cy="0" r="1.6" fill="#52a8ff"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="6.0s" begin="0.0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.9;0" dur="6.0s" begin="0.0s" repeatCount="indefinite"/></circle>
    <circle cx="130" cy="0" r="1.2" fill="#3dd68c"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="7.4s" begin="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.8;0" dur="7.4s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="205" cy="0" r="1.8" fill="#a1a1a1"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="5.6s" begin="2.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.7;0" dur="5.6s" begin="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="0" r="1.3" fill="#52a8ff"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="8.2s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.85;0" dur="8.2s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="395" cy="0" r="1.6" fill="#3dd68c"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="6.8s" begin="3.0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.9;0" dur="6.8s" begin="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="0" r="1.2" fill="#a1a1a1"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="7.0s" begin="1.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.7;0" dur="7.0s" begin="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="585" cy="0" r="1.7" fill="#52a8ff"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="5.9s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.85;0" dur="5.9s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="670" cy="0" r="1.3" fill="#3dd68c"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="8.0s" begin="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.8;0" dur="8.0s" begin="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="745" cy="0" r="1.6" fill="#a1a1a1"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="6.4s" begin="1.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.7;0" dur="6.4s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="815" cy="0" r="1.4" fill="#52a8ff"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="7.6s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.9;0" dur="7.6s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="245" cy="0" r="1.2" fill="#3dd68c"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="9.0s" begin="4.0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.75;0" dur="9.0s" begin="4.0s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="0" r="1.5" fill="#a1a1a1"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="6.6s" begin="3.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.7;0" dur="6.6s" begin="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="630" cy="0" r="1.3" fill="#52a8ff"><animateTransform attributeName="transform" type="translate" values="0 280;0 -20" dur="7.9s" begin="2.0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.85;0" dur="7.9s" begin="2.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- wordmark -->
  <text x="440" y="118" text-anchor="middle" class="mono" font-size="46" font-weight="700" letter-spacing="3" fill="#ededed">COLDPHRASE</text>
  <rect x="612" y="90" width="14" height="34" fill="#52a8ff"><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></rect>
  <text x="440" y="150" text-anchor="middle" class="mono" font-size="15" letter-spacing="2" fill="#a1a1a1">offline &#183; single-file &#183; argon2id + aes-256-gcm</text>

  <!-- snake crawling across the bottom -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="-90 0;980 0" dur="7s" repeatCount="indefinite"/>
    <rect x="0"  y="205" width="16" height="16" rx="2" fill="#ededed"/>
    <rect x="20" y="205" width="16" height="16" rx="2" fill="#a1a1a1"/>
    <rect x="40" y="205" width="16" height="16" rx="2" fill="#a1a1a1"/>
    <rect x="60" y="205" width="16" height="16" rx="2" fill="#666666"/>
    <rect x="80" y="205" width="16" height="16" rx="2" fill="#666666"/>
  </g>
  <rect x="470" y="205" width="16" height="16" rx="2" fill="#3dd68c"><animate attributeName="opacity" values="1;.4;1" dur="1.4s" repeatCount="indefinite"/></rect>
</svg>
