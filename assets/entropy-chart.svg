<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340" role="img" aria-label="Brute-force time by password entropy">
  <defs>
    <style>.mono{font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}</style>
  </defs>
  <rect width="880" height="340" rx="12" fill="#000000"/>
  <rect x="0.5" y="0.5" width="879" height="339" rx="12" fill="none" stroke="#262626"/>

  <text x="28" y="40" class="mono" font-size="15" font-weight="700" fill="#ededed">Time to brute-force a ColdPhrase password</text>
  <text x="28" y="60" class="mono" font-size="11" fill="#a1a1a1">Argon2id 256 MiB, attacker at 10,000 guesses/s &#183; bar length &#8733; log10(seconds)</text>

  <!-- bars: base width/opacity are the FINAL values (correct even without SMIL);
       the animation grows into them. -->
  <text x="28" y="96"  class="mono" font-size="12" fill="#a1a1a1">28 bit</text>
  <text x="92" y="96"  class="mono" font-size="11" fill="#666666">weak human pw</text>
  <rect x="210" y="86" height="16" rx="2" fill="#ff6166" width="128"><animate attributeName="width" from="0" to="128" dur="1.0s" begin="0s" fill="freeze"/></rect>
  <text x="348" y="98" class="mono" font-size="12" fill="#ff6166">~4 hours<animate attributeName="opacity" from="0" to="1" dur=".4s" begin="1.0s" fill="freeze"/></text>

  <text x="28" y="136" class="mono" font-size="12" fill="#a1a1a1">40 bit</text>
  <text x="92" y="136" class="mono" font-size="11" fill="#666666">8 random chars</text>
  <rect x="210" y="126" height="16" rx="2" fill="#f5a623" width="235"><animate attributeName="width" from="0" to="235" dur="1.1s" begin="0.15s" fill="freeze"/></rect>
  <text x="455" y="138" class="mono" font-size="12" fill="#f5a623">~1.7 years<animate attributeName="opacity" from="0" to="1" dur=".4s" begin="1.25s" fill="freeze"/></text>

  <text x="28" y="176" class="mono" font-size="12" fill="#a1a1a1">50 bit</text>
  <text x="92" y="176" class="mono" font-size="11" fill="#666666">decent pw</text>
  <rect x="210" y="166" height="16" rx="2" fill="#f5a623" width="330"><animate attributeName="width" from="0" to="330" dur="1.2s" begin="0.3s" fill="freeze"/></rect>
  <text x="550" y="178" class="mono" font-size="12" fill="#f5a623">~1,780 years<animate attributeName="opacity" from="0" to="1" dur=".4s" begin="1.5s" fill="freeze"/></text>

  <text x="28" y="216" class="mono" font-size="12" fill="#a1a1a1">66 bit</text>
  <text x="92" y="216" class="mono" font-size="11" fill="#666666">6 BIP39 words</text>
  <rect x="210" y="206" height="16" rx="2" fill="#3dd68c" width="475"><animate attributeName="width" from="0" to="475" dur="1.35s" begin="0.45s" fill="freeze"/></rect>
  <text x="695" y="218" class="mono" font-size="12" fill="#3dd68c">117M years<animate attributeName="opacity" from="0" to="1" dur=".4s" begin="1.8s" fill="freeze"/></text>

  <text x="28" y="256" class="mono" font-size="12" fill="#ededed" font-weight="700">78 bit</text>
  <text x="92" y="256" class="mono" font-size="11" fill="#3dd68c">&#9733; generated</text>
  <rect x="210" y="246" height="16" rx="2" fill="#3dd68c" width="590"><animate attributeName="width" from="0" to="590" dur="1.5s" begin="0.6s" fill="freeze"/></rect>
  <text x="210" y="288" class="mono" font-size="12" fill="#ededed">~480,000,000,000 years &#8212; &#8776; 35&#215; the age of the universe<animate attributeName="opacity" from="0" to="1" dur=".5s" begin="2.1s" fill="freeze"/></text>

  <text x="28" y="318" class="mono" font-size="10.5" fill="#666666">The cipher (AES-256) is never attacked; only the password. This is why the built-in generator matters.</text>
</svg>
